name: Smoke Tests

on:
  schedule:
    - cron: '0 7 * * *'  # 7am UTC daily
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  smoke-tests:
    runs-on: ubuntu-22.04
    permissions:
      contents: write       # needed to commit results.json back to the repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run tests
        env:
          TEST_BASE_URL: ${{ secrets.TEST_BASE_URL }}
          TEST_CLIENT_EMAIL: ${{ secrets.TEST_CLIENT_EMAIL }}
          TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
        run: pytest --json-report --json-report-file=pytest-report.json -v
        continue-on-error: true

      - name: Write results.json
        run: python utils/reporter.py pytest-report.json

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet || git commit -m "Test results $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
