name: Smoke Tests

on:
  schedule:
    - cron: '0 7 * * *'  # 7am UTC daily
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  smoke-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run tests
        env:
          TEST_BASE_URL: ${{ secrets.TEST_BASE_URL }}
          TEST_CLIENT_EMAIL: ${{ secrets.TEST_CLIENT_EMAIL }}
          TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
        run: pytest --json-report --json-report-file=results.json -v
        continue-on-error: true

      - name: Post results to live site
        env:
          OWL_TEST_API_KEY: ${{ secrets.OWL_TEST_API_KEY }}
          RESULTS_ENDPOINT: ${{ secrets.RESULTS_ENDPOINT }}
        run: python utils/reporter.py results.json
